name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      # Guard against a release tag that doesn't match the package version —
      # mix.exs is the source of truth for what actually gets shipped.
      - name: Verify tag matches mix.exs version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          mix_version=$(grep -Po '@version\s+"\K[^"]+' mix.exs)
          if [ "$tag" != "$mix_version" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME (${tag}) does not match mix.exs @version ${mix_version}"
            exit 1
          fi

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-test-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            mix-test-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

      - run: mix deps.get --check-locked
      - run: mix compile --warnings-as-errors
      - run: mix test

      - name: Publish to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
